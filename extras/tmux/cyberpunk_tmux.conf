# vim:set ft=tmux:
# Cyberpunk theme for tmux — main configuration

# ── Load palette ──────────────────────────────────────────────
source -F "#{d:current_file}/themes/cyberpunk#{?#{==:#{@cyberpunk_flavor},storm},,_#{@cyberpunk_flavor}}.conf"

# ── Status bar background ─────────────────────────────────────
%if "#{==:#{@cyberpunk_status_background},none}"
  set -gF status-style "default"
%elif "#{==:#{@cyberpunk_status_background},theme}"
  set -gF status-style "bg=#{@thm_bg}"
%else
  set -gF status-style "bg=#{@cyberpunk_status_background}"
%endif

# ── Pane borders ──────────────────────────────────────────────
%if "#{==:#{@cyberpunk_pane_borders},yes}"
  set -gF pane-border-style "fg=#{@thm_overlay_2}"
  set -gF pane-active-border-style "fg=#{@thm_teal}"
%endif

# ── Pane dimming (inactive panes) ────────────────────────────
%if "#{==:#{@cyberpunk_pane_dim},yes}"
  set -gF window-style "bg=#{@thm_bg},fg=#{@thm_subtext_1}"
  set -gF window-active-style "bg=#{@thm_surface_1},fg=#{@thm_fg}"
%endif

# ── Window status styling ────────────────────────────────────
%if "#{==:#{@cyberpunk_window_status},yes}"
  set -gF window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
  set -gF window-status-last-style "bg=#{@thm_bg},fg=#{@thm_peach}"
  set -gF window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
  set -gF window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
  set -gF window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"
  set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"
%endif

# ── Popup styling ────────────────────────────────────────────
%if "#{==:#{@cyberpunk_popup},yes}"
  set -gF popup-style "fg=#{@thm_fg},bg=#{@thm_surface_0}"
  set -gF popup-border-style "fg=#{@thm_teal}"
%endif

# ── Message, mode & clock styling ────────────────────────────
%if "#{==:#{@cyberpunk_messages},yes}"
  set -gF message-style "fg=#{@thm_fg},bg=#{@thm_surface_2}"
  set -gF message-command-style "fg=#{@thm_teal},bg=#{@thm_surface_2}"
  set -gF mode-style "fg=#{@thm_bg},bg=#{@thm_teal}"
  set -gF clock-mode-colour "#{@thm_green}"
  set -gF display-panes-active-colour "#{@thm_pink}"
  set -gF display-panes-colour "#{@thm_teal}"
%endif
