# vim:set ft=tmux:
# Cyberpunk theme for tmux — main configuration

# ── Load palette ──────────────────────────────────────────────
source -F "#{d:current_file}/themes/cyberpunk#{?#{==:#{@cyberpunk_flavor},storm},,_#{@cyberpunk_flavor}}.conf"

# ── Status bar background ─────────────────────────────────────
%if "#{==:#{@cyberpunk_status_background},none}"
  set -gF status-style "default"
%elif "#{==:#{@cyberpunk_status_background},theme}"
  set -gF status-style "bg=#{@thm_bg}"
%else
  set -gF status-style "bg=#{@cyberpunk_status_background}"
%endif

# ── Pane borders ──────────────────────────────────────────────
%if "#{==:#{@cyberpunk_pane_borders},yes}"
  set -gF pane-border-style "fg=#{@thm_overlay_2}"
  set -gF pane-active-border-style "fg=#{@thm_teal}"
%endif

# ── Pane dimming (inactive panes) ────────────────────────────
%if "#{==:#{@cyberpunk_pane_dim},yes}"
  set -gF window-style "bg=#{@thm_crust},fg=#{@thm_overlay_2}"
  set -gF window-active-style "bg=#{@thm_bg},fg=#{@thm_fg}"
%endif

# ── Popup styling ────────────────────────────────────────────
%if "#{==:#{@cyberpunk_popup},yes}"
  set -gF popup-style "fg=#{@thm_fg},bg=#{@thm_surface_0}"
  set -gF popup-border-style "fg=#{@thm_teal}"
%endif

# ── Message, mode & clock styling ────────────────────────────
%if "#{==:#{@cyberpunk_messages},yes}"
  set -gF message-style "fg=#{@thm_fg},bg=#{@thm_surface_2}"
  set -gF message-command-style "fg=#{@thm_teal},bg=#{@thm_surface_2}"
  set -gF mode-style "fg=#{@thm_bg},bg=#{@thm_teal}"
  set -gF clock-mode-colour "#{@thm_green}"
  set -gF display-panes-active-colour "#{@thm_pink}"
  set -gF display-panes-colour "#{@thm_teal}"
%endif

# ── Statusbar layout ──────────────────────────────────────────
# Glitch-heavy cyberpunk HUD with system gadgets

# @_cp_scripts is set by cyberpunk.tmux entry point (absolute path)

set -g status-position top
set -g status-justify "absolute-centre"
set -g status-interval 5

# ── Status left: session / dir / git / zoom ──
set -g status-left-length 120
set -g status-left ""

# Prefix-aware session name
set -ga status-left "#{?client_prefix,#[fg=#{@thm_red}]│#[bg=#{@thm_red}#,fg=#{@thm_bg}#,bold] ⌘ #S #[bg=default#,fg=default#,none]#[fg=#{@thm_red}] │ ,#[fg=#{@thm_green}#,dim]│#[bg=#{@thm_red}#,fg=#{@thm_bg}#,bold#,nodim] ⌘ #S #[bg=default#,fg=default#,none]#[fg=#{@thm_green}#,dim] │ }"

# Current directory
set -ga status-left "#[fg=#{@thm_teal},none]  #{b:pane_current_path} "

# Git status
set -ga status-left "#(#{@_cp_scripts}/git_status.sh #{pane_current_path})"

# Zoom indicator
set -ga status-left "#{?window_zoomed_flag,#[fg=#{@thm_green}#,dim] │ #[bg=#{@thm_yellow}#,fg=#{@thm_bg}#,bold] 🔍 ZOOM #[bg=default#,fg=default#,none],}"

# Closing edge
set -ga status-left "#[fg=#{@thm_green},dim] │#[none]"

# ── Windows (centre) ──
set -gF window-status-format "#[fg=#{@thm_subtext_0}] ##I:##W "
set -gF window-status-current-format "#[bg=#{@thm_teal}22,fg=#{@thm_teal}] ##I:##W "
set -gF window-status-separator "#[fg=#{@thm_overlay_2}]│"

# ── Status right: online / cpu / mem / battery ──
set -g status-right-length 120
set -g status-right ""

# Claude sessions widget (requires claude-session-manager)
%if "#{==:#{@cyberpunk_claude_sessions},yes}"
  set -ga status-right "#(#{@_cp_scripts}/claude_sessions.sh)"
%endif

# Online indicator
set -ga status-right "#[fg=#{@thm_green},dim]│#[none] #(#{@_cp_scripts}/online.sh)"

# CPU gauge
set -ga status-right "#[fg=#{@thm_green},dim] │ #[none]#(#{@_cp_scripts}/cpu.sh)"

# Memory gauge
set -ga status-right "#[fg=#{@thm_green},dim] │ #[none]#(#{@_cp_scripts}/memory.sh)"

# Battery gauge (empty if no battery)
set -ga status-right "#[fg=#{@thm_green},dim] │ #[none]#(#{@_cp_scripts}/battery.sh)"

# Closing edge
set -ga status-right "#[fg=#{@thm_pink},dim] │#[none]"
