# vim:set ft=tmux:
# Cyberpunk theme options — all defaults use -ogq so user values win

# Flavor: "storm" (default), "night", "neon"
set -ogq @cyberpunk_flavor "storm"

# Feature toggles: "yes" or "no"
set -ogq @cyberpunk_pane_dim "yes"
set -ogq @cyberpunk_pane_borders "yes"
set -ogq @cyberpunk_popup "yes"
set -ogq @cyberpunk_messages "yes"

# Status bar background: "theme" (uses @thm_bg) or "none" (transparent)
set -ogq @cyberpunk_status_background "theme"

# Claude Code session monitoring: "yes" or "no"
set -ogq @cyberpunk_claude_sessions "no"
