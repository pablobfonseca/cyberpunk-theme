# Cyberpunk Theme for Ghostty Terminal
# Neon-soaked terminal with electric aesthetics
# Place this in your ghostty config directory

# Background and foreground
background = 0a0e14
foreground = e0e6f0

# Cursor
cursor-color = 00ffff
cursor-text = 0a0e14

# Selection
selection-background = 2a1f3d
selection-foreground = e0e6f0

# Normal colors (ANSI 0-7)
palette = 0=#0a0e14
palette = 1=#ff007f
palette = 2=#00ff41
palette = 3=#ffff00
palette = 4=#0080ff
palette = 5=#bf00ff
palette = 6=#00ffff
palette = 7=#e0e6f0

# Bright colors (ANSI 8-15)
palette = 8=#3b4458
palette = 9=#ff4499
palette = 10=#44ff77
palette = 11=#ffff66
palette = 12=#4499ff
palette = 13=#dd66ff
palette = 14=#66ffff
palette = 15=#ffffff

# Cyberpunk-specific extended colors for 256-color support
# These provide additional neon shades for better gradient effects

# Extended neon variations
palette = 16=#1a0a14  # Dark pink
palette = 17=#ff0040  # Hot pink variant
palette = 18=#00ff80  # Bright green variant
palette = 19=#80ff00  # Lime green
palette = 20=#0040ff  # Deep blue
palette = 21=#8000ff  # Purple variant
palette = 22=#00c0ff  # Sky cyan
palette = 23=#ff8000  # Neon orange

# Additional matrix-style greens
palette = 24=#004020  # Dark matrix green
palette = 25=#008040  # Medium matrix green
palette = 26=#00c060  # Bright matrix green
palette = 27=#20ff80  # Electric matrix green

# Cyberpunk accent colors for special use
palette = 28=#200510  # Deep pink shadow
palette = 29=#400a20  # Pink shadow
palette = 30=#0a0520  # Purple shadow  
palette = 31=#050a20  # Blue shadow

# UI element colors
# These work with modern terminal features

# Window styling (if supported)
window-theme = dark
window-padding-x = 8
window-padding-y = 8

# Font configuration optimized for coding
font-family = "JetBrains Mono"
font-size = 14
font-weight = normal

# Terminal behavior optimized for cyberpunk aesthetics
theme = dark
command = /bin/bash

# Transparency and blur effects (cyberpunk glass effect)
# Uncomment these for that futuristic translucent terminal look
# window-opacity = 0.95
# background-blur = true

# Cyberpunk-inspired cursor styling
cursor-style = block
cursor-style-blink = true

# Enhanced color support for true cyberpunk experience
color-mode = true-color

# Performance optimizations for smooth neon animations
vsync = true
fps = 60

# Sound effects (if you want that authentic cyberpunk terminal beep)
# bell-sound = true

# Working directory and shell integration
shell-integration = true
shell-integration-features = cursor,sudo,title

# Scrolling optimizations for those long hacking sessions
scrollback-limit = 10000
scroll-multiplier = 3

# Copy/paste behavior with cyberpunk flair
copy-on-select = true
strip-ansi-escape-codes = false

# Tab styling (for that multi-terminal hacker setup)
tab-bar = true
tab-bar-style = fancy
tab-close-button = true

# Mouse integration for the modern cyberpunk hacker
mouse = true
click-repeat-delay = 400
click-repeat-interval = 30

# URL handling (for clicking through to those underground sites)
auto-detect-url = true
url-style = underline

# Environment optimizations
env = TERM=xterm-256color
env = COLORTERM=truecolor

# Custom title format for that elite hacker feel
title = "🌃 CYBERPUNK TERMINAL // {command}"

# Additional cyberpunk terminal effects
# These require ghostty features that may not be available in all versions
# Uncomment to enable if supported:

# # Matrix-style text effects
# text-rendering = crisp
# 
# # Neon glow effect (experimental)
# text-shadow = true
# text-shadow-color = 00ffff
# text-shadow-radius = 2
#
# # Scanlines for that retro-futuristic CRT feel
# scanlines = true
# scanlines-opacity = 0.1
#
# # Bloom effect for neon colors
# bloom = true
# bloom-intensity = 0.3