# Example tmux configuration with Cyberpunk theme
# The theme provides @thm_* color variables (catppuccin-compatible)
# plus optional features: pane dimming, borders, status styling, etc.

# Basic tmux settings
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ===================
# CYBERPUNK THEME
# ===================
# Configure before loading (all options default to "yes")
# set -g @cyberpunk_flavor "storm"           # storm | night | neon
# set -g @cyberpunk_pane_dim "yes"           # dim inactive panes
# set -g @cyberpunk_pane_borders "yes"       # neon pane borders
# set -g @cyberpunk_window_status "yes"      # window tab styling
# set -g @cyberpunk_popup "yes"              # popup styling
# set -g @cyberpunk_messages "yes"           # message/mode/clock styling
# set -g @cyberpunk_status_background "theme" # theme | none (transparent)

# Load via run (works with local clone or TPM)
run '~/path/to/cyberpunk-theme/cyberpunk.tmux'

# Or with TPM:
# set -g @plugin 'pablobfonseca/cyberpunk-theme'

# ===================
# STATUS BAR LAYOUT
# ===================
# The theme sets colors but your layout is yours to customize.
# Use @thm_* variables for colors that match the active flavor.

set -g status-position top
set -g status-justify "absolute-centre"

# Example status-left using theme colors
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{b:pane_current_path} "

set -g window-status-format " #I: #W "
set -g window-status-current-format " #I: #W "
