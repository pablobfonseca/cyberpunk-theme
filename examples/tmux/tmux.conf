# Example tmux configuration with Cyberpunk theme
# Place in ~/.tmux.conf or source from your existing config

# Basic tmux settings optimized for cyberpunk aesthetics
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"  # True color support

# Enable mouse support for modern workflow
set -g mouse on

# Increase scrollback buffer
set -g history-limit 50000

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Enable activity alerts
setw -g monitor-activity on
set -g visual-activity off

# Key bindings (optional - customize as needed)
# Reload config with r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Split panes with | and -
bind | split-window -h
bind - split-window -v

# Vim-like pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ===================
# CYBERPUNK THEME
# ===================
source-file ~/path/to/cyberpunk-theme/extras/tmux/cyberpunk.tmux

