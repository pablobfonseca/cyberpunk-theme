# Example tmux configuration with Cyberpunk theme
# The cyberpunk.tmux file provides color variables (@thm_*) compatible
# with catppuccin's naming convention. Swap the source-file line to
# switch between themes.

# Basic tmux settings
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g monitor-activity on
set -g visual-activity off

# ===================
# THEME PALETTE
# ===================
# Load cyberpunk colors (or swap with catppuccin_mocha_tmux.conf)
source-file ~/path/to/cyberpunk-theme/extras/tmux/cyberpunk.tmux

# ===================
# THEME-DRIVEN STYLING
# ===================
# All styling uses @thm_* variables so it works with any palette

# Status bar
set -g status-position top
set -g status-style "bg=#{@thm_bg}"
set -g status-justify "absolute-centre"

# Window status
set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"

# Pane borders and dimming
set -g pane-border-style "fg=#{@thm_overlay_2}"
set -g pane-active-border-style "fg=#{@thm_teal}"
set -g window-style "bg=#{@thm_bg},fg=#{@thm_subtext_1}"
set -g window-active-style "bg=#{@thm_surface_1},fg=#{@thm_fg}"

# Popups, messages, copy mode
set -g popup-style "fg=#{@thm_fg},bg=#{@thm_surface_0}"
set -g popup-border-style "fg=#{@thm_teal}"
set -g message-style "fg=#{@thm_fg},bg=#{@thm_surface_2}"
set -g message-command-style "fg=#{@thm_teal},bg=#{@thm_surface_2}"
set -g mode-style "fg=#{@thm_bg},bg=#{@thm_teal}"
set -g clock-mode-colour "#{@thm_green}"
